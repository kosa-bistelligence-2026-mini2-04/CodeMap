services:
  postgres_test:
    image: postgres:17-alpine
    container_name: app_postgres_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: repo_lens_test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d repo_lens_test']
      interval: 5s
      timeout: 5s
      retries: 5
