# RepoInsight frontend nginx config
# - Serves Vite build (SPA fallback)
# - Proxies /api  -> backend:8770
# - Proxies /ws   -> backend:8770 with WebSocket upgrade

upstream repoinsight_backend {
    server backend:8770;
    keepalive 32;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    # HSTS — only meaningful behind an HTTPS terminator, but standard to include
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Allow large repo upload payloads
    client_max_body_size 50m;

    # Static assets — long cache
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico|map)$ {
        try_files $uri =404;
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Backend REST API
    location /api/ {
        proxy_pass         http://repoinsight_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_buffering    off;
    }

    # WebSocket (real-time progress)
    location /ws {
        proxy_pass         http://repoinsight_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # SPA fallback — must be last
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip compression — reduces Vite bundle (index.js + echarts chunk) over the wire
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml
        font/woff
        font/woff2;

    # Hide nginx version
    server_tokens off;
}
